# =============================================================================
#  BIG DATA PIPELINE — Hadoop · Spark · Hive · HBase · ZooKeeper
# =============================================================================

networks:
  bigdata-net:
    driver: bridge

volumes:
  hadoop_namenode:
  hadoop_datanode1:
  hadoop_datanode2:
  hadoop_historyserver:
  hive_metastore_db:
  zookeeper_data:
  zookeeper_log:

x-hadoop-env: &hadoop-env
  CORE_CONF_fs_defaultFS: hdfs://namenode:9000
  CORE_CONF_hadoop_http_staticuser_user: root
  HDFS_CONF_dfs_replication: 1
  HDFS_CONF_dfs_webhdfs_enabled: "true"
  HDFS_CONF_dfs_permissions_enabled: "false"
  YARN_CONF_yarn_resourcemanager_hostname: resourcemanager
  YARN_CONF_yarn_nodemanager_aux__services: mapreduce_shuffle
  YARN_CONF_yarn_log___aggregation___enable: "true"
  YARN_CONF_yarn_log_server_url: http://historyserver:8188/applicationhistory/logs/
  MAPRED_CONF_mapreduce_framework_name: yarn
  MAPRED_CONF_mapreduce_map_output_compress: "true"
  MAPRED_CONF_mapreduce_jobhistory_address: historyserver:10020
  MAPRED_CONF_mapreduce_jobhistory_webapp_address: historyserver:19888

x-airbnb-env: &airbnb-env
  MONGODB_URI: ${MONGODB_URI:-}
  MONGODB_DATABASE: ${MONGODB_DATABASE:-sample_airbnb}
  MONGODB_COLLECTION: ${MONGODB_COLLECTION:-listingsAndReviews}
  AIRBNB_RAW_PATH: ${AIRBNB_RAW_PATH:-hdfs://namenode:9000/data/airbnb/raw/listingsAndReviews}
  AIRBNB_INGEST_DATE: ${AIRBNB_INGEST_DATE:-}
  AIRBNB_RAW_FULL_REFRESH: ${AIRBNB_RAW_FULL_REFRESH:-false}
  AIRBNB_CLEAN_PATH: ${AIRBNB_CLEAN_PATH:-hdfs://namenode:9000/data/airbnb/clean/listings}
  AIRBNB_ANALYTICS_PATH: ${AIRBNB_ANALYTICS_PATH:-hdfs://namenode:9000/data/airbnb/analytics/market_room_type_summary}
  SPARK_OUTPUT_PARTITIONS: ${SPARK_OUTPUT_PARTITIONS:-4}
  SPARK_SQL_SHUFFLE_PARTITIONS: ${SPARK_SQL_SHUFFLE_PARTITIONS:-8}
  MONGO_SPARK_CONNECTOR_PACKAGE: ${MONGO_SPARK_CONNECTOR_PACKAGE:-org.mongodb.spark:mongo-spark-connector_2.12:10.2.2}
  SPARK_HOME: /usr/local/spark
  PYTHONPATH: /usr/local/spark/python:/usr/local/spark/python/lib/pyspark.zip:/usr/local/spark/python/lib/py4j-0.10.9.5-src.zip

services:

# =============================================================================
#  HADOOP — HDFS
# =============================================================================

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    restart: unless-stopped
    ports:
      - "9870:9870"    # NameNode Web UI
      - "9000:9000"    # HDFS RPC
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      <<: *hadoop-env
      CLUSTER_NAME: bigdata-cluster
      INIT_DAEMON_STEP: setup_hdfs
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    restart: unless-stopped
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode1:/hadoop/dfs/data
    environment:
      <<: *hadoop-env
      SERVICE_PRECONDITION: "namenode:9870"
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - bigdata-net

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    restart: unless-stopped
    ports:
      - "9865:9864"
    volumes:
      - hadoop_datanode2:/hadoop/dfs/data
    environment:
      <<: *hadoop-env
      SERVICE_PRECONDITION: "namenode:9870"
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - bigdata-net

# =============================================================================
#  HADOOP — YARN
# =============================================================================

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    restart: unless-stopped
    profiles:
      - yarn
    environment:
      <<: *hadoop-env
      SERVICE_PRECONDITION: "namenode:9870 datanode1:9864"
    depends_on:
      - namenode
      - datanode1
    networks:
      - bigdata-net

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    restart: unless-stopped
    profiles:
      - yarn
    ports:
      - "8042:8042"
    environment:
      <<: *hadoop-env
      SERVICE_PRECONDITION: "namenode:9870 datanode1:9864 resourcemanager:8088"
    depends_on:
      - resourcemanager
    networks:
      - bigdata-net

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    restart: unless-stopped
    profiles:
      - yarn
    ports:
      - "8188:8188"
      - "19888:19888"
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    environment:
      <<: *hadoop-env
      SERVICE_PRECONDITION: "namenode:9870 datanode1:9864 resourcemanager:8088"
    depends_on:
      - resourcemanager
    networks:
      - bigdata-net

# =============================================================================
#  SPARK
# =============================================================================

  spark-master:
    image: bde2020/spark-master:3.3.0-hadoop3.3
    restart: unless-stopped
    ports:
      - "8085:8080"    # Spark Master Web UI
      - "7077:7077"    # Spark Master RPC
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
    depends_on:
      namenode:
        condition: service_healthy
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  spark-worker-1:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-2g}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - bigdata-net

  spark-worker-2:
    image: bde2020/spark-worker:3.3.0-hadoop3.3
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - SPARK_WORKER_MEMORY=${SPARK_WORKER_MEMORY:-2g}
      - SPARK_WORKER_CORES=${SPARK_WORKER_CORES:-2}
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - bigdata-net

  airbnb-ingest:
    image: jupyter/pyspark-notebook:spark-3.3.0
    restart: "no"
    profiles:
      - jobs
    volumes:
      - ./notebooks:/home/jovyan/work:ro
    environment:
      <<: *airbnb-env
      SPARK_MASTER_URL: spark://spark-master:7077
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    command: >
      bash -lc "jupyter nbconvert
      --to notebook
      --execute /home/jovyan/work/mongo_airbnb_to_parquet.ipynb
      --ExecutePreprocessor.timeout=-1
      --output-dir=/tmp"
    depends_on:
      namenode:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker-1:
        condition: service_started
      spark-worker-2:
        condition: service_started
    networks:
      - bigdata-net

# =============================================================================
#  HIVE
# =============================================================================

  hive-metastore-db:
    image: postgres:14-alpine
    restart: unless-stopped
    profiles:
      - hive
    command: ["postgres", "-c", "password_encryption=md5"]
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive_password
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - hive_metastore_db:/var/lib/postgresql/data
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  hive-metastore-init:
    image: bde2020/hive:2.3.2-postgresql-metastore
    restart: "no"
    profiles:
      - hive
    volumes:
      - ./hive-conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./hive-conf/init-metastore.sh:/init-metastore.sh:ro
    environment:
      SERVICE_PRECONDITION: "namenode:9870 hive-metastore-db:5432"
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    command: /bin/bash /init-metastore.sh
    depends_on:
      hive-metastore-db:
        condition: service_healthy
      namenode:
        condition: service_healthy
    networks:
      - bigdata-net

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    restart: unless-stopped
    profiles:
      - hive
    ports:
      - "9083:9083"    # Hive Metastore Thrift
    volumes:
      - ./hive-conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    environment:
      SERVICE_PRECONDITION: "namenode:9870 hive-metastore-db:5432"
      HIVE_METASTORE_URIS: thrift://hive-metastore:9083
      HIVE_METASTORE_DB_TYPE: postgres
      HIVE_METASTORE_DB_HOST: hive-metastore-db
      HIVE_METASTORE_DB_PORT: 5432
      HIVE_METASTORE_DB_NAME: metastore
      HIVE_METASTORE_DB_USER: hive
      HIVE_METASTORE_DB_PASS: hive_password
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    command: /opt/hive/bin/hive --service metastore
    depends_on:
      hive-metastore-init:
        condition: service_completed_successfully
    networks:
      - bigdata-net

  hiveserver2:
    image: bde2020/hive:2.3.2-postgresql-metastore
    restart: unless-stopped
    profiles:
      - hive
    ports:
      - "10000:10000"  # HiveServer2 JDBC
      - "10002:10002"  # HiveServer2 Web UI
    volumes:
      - ./hive-conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
    environment:
      SERVICE_PRECONDITION: "hive-metastore:9083"
      HIVE_METASTORE_URIS: thrift://hive-metastore:9083
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
    command: startup.sh
    depends_on:
      - hive-metastore
    networks:
      - bigdata-net

# =============================================================================
#  ZOOKEEPER
# =============================================================================

  zookeeper:
    image: zookeeper:3.8
    restart: unless-stopped
    profiles:
      - hbase
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/data
      - zookeeper_log:/datalog
    environment:
      ZOO_MY_ID: 1
      ZOO_SERVERS: server.1=zookeeper:2888:3888;2181
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD-SHELL", "zkServer.sh status 2>/dev/null | grep -q 'Mode:' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

# =============================================================================
#  HBASE
# =============================================================================

  hbase-master:
    image: bde2020/hbase-master:1.0.0-hbase1.2.6
    restart: unless-stopped
    profiles:
      - hbase
    ports:
      - "16000:16000"
      - "16010:16010"  # HBase Master Web UI
    environment:
      HBASE_CONF_hbase_rootdir: hdfs://namenode:9000/hbase
      HBASE_CONF_hbase_cluster_distributed: "true"
      HBASE_CONF_hbase_zookeeper_quorum: zookeeper
      HBASE_CONF_hbase_zookeeper_property_clientPort: 2181
      HBASE_CONF_hbase_master: hbase-master:16000
      HBASE_CONF_hbase_master_hostname: hbase-master
      HBASE_MANAGES_ZK: "false"
      SERVICE_PRECONDITION: "namenode:9870 zookeeper:2181"
    depends_on:
      namenode:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    networks:
      - bigdata-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:16010"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  hbase-regionserver:
    image: bde2020/hbase-regionserver:1.0.0-hbase1.2.6
    restart: unless-stopped
    profiles:
      - hbase
    ports:
      - "16020:16020"
      - "16030:16030"
    environment:
      HBASE_CONF_hbase_rootdir: hdfs://namenode:9000/hbase
      HBASE_CONF_hbase_cluster_distributed: "true"
      HBASE_CONF_hbase_zookeeper_quorum: zookeeper
      HBASE_CONF_hbase_zookeeper_property_clientPort: 2181
      HBASE_CONF_hbase_regionserver_hostname: hbase-regionserver
      HBASE_MANAGES_ZK: "false"
      SERVICE_PRECONDITION: "namenode:9870 zookeeper:2181 hbase-master:16010"
    depends_on:
      hbase-master:
        condition: service_healthy
    networks:
      - bigdata-net

# =============================================================================
#  JUPYTER — For Spark + Hive development
# =============================================================================

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.3.0
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "8888:8888"    # Jupyter Web UI
    environment:
      <<: *airbnb-env
      JUPYTER_ENABLE_LAB: "yes"
      SPARK_MASTER: spark://spark-master:7077
      SPARK_MASTER_URL: spark://spark-master:7077
    volumes:
      - ./notebooks:/home/jovyan/work
    depends_on:
      spark-master:
        condition: service_healthy
    networks:
      - bigdata-net
